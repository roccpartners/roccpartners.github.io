<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocc Presentation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Ensure vertical scrolling */
            background-color: #f4f4f4;
        }
        .container {
            width: 100%; /* Full width container */
            margin: 0; /* Remove all margins */
            padding: 0; /* Remove padding */
            text-align: center;
        }
        img {
            width: 100%; /* Ensure images fill the width */
            height: auto;
            display: block; /* Removes default inline space between images */
            margin: 0; /* Remove margin between images */
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="page1.jpg" alt="Rocc Presentation - Page 1">
        <img src="page2.jpg" alt="Rocc Presentation - Page 2">
        <img src="page3.jpg" alt="Rocc Presentation - Page 3">
        <img src="page4.jpg" alt="Rocc Presentation - Page 4">
        <img src="page5.jpg" alt="Rocc Presentation - Page 5">
    </div>
</body>
</html>
